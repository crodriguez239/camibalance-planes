<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>camibalance · Tu plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6EFE4; --ink:#2E2722; --clay:#C2674A; --sage:#7C8B6B;
    --gold:#C99A4E; --soft:#EFE4D2; --line:#DCCBB3; --warn:#B65B3C;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    font-family:'Mulish',sans-serif; color:var(--ink);
    background:
      radial-gradient(120% 80% at 85% -5%, rgba(201,154,78,.20), transparent 55%),
      radial-gradient(100% 70% at -10% 100%, rgba(124,139,107,.18), transparent 55%),
      var(--cream);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- GATE ---------- */
  .pf-gate{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 22px; text-align:center; }
  .pf-logo{ font-family:'Fraunces',serif; font-size:38px; font-weight:600; letter-spacing:-.8px;
    animation:rise .7s ease both; }
  .pf-logo b{ color:var(--clay); }
  .pf-tag{ font-size:14px; color:var(--sage); letter-spacing:.04em; margin-top:6px; margin-bottom:34px;
    animation:rise .7s .08s ease both; }
  .pf-card{ background:var(--cream); border:1px solid var(--line); border-radius:20px;
    padding:30px 26px; width:100%; max-width:380px; box-shadow:0 30px 70px -45px rgba(46,39,34,.5);
    animation:rise .7s .16s ease both; }
  .pf-card h2{ font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin-bottom:6px; }
  .pf-card p{ font-size:13.5px; color:rgba(46,39,34,.7); margin-bottom:20px; }
  .pf-input{ width:100%; padding:14px 16px; border:1.5px solid var(--line); border-radius:12px;
    font-family:'Mulish',sans-serif; font-size:16px; color:var(--ink); background:#fff; text-align:center;
    letter-spacing:.05em; transition:border-color .2s; }
  .pf-input:focus{ outline:none; border-color:var(--clay); }
  .pf-btn{ width:100%; margin-top:12px; padding:14px; border:none; border-radius:12px;
    background:var(--ink); color:var(--cream); font-family:'Mulish',sans-serif; font-size:15px; font-weight:700;
    letter-spacing:.03em; cursor:pointer; transition:transform .15s, background .2s; }
  .pf-btn:hover{ background:var(--clay); }
  .pf-btn:active{ transform:scale(.98); }
  .pf-err{ color:var(--warn); font-size:13px; font-weight:600; margin-top:14px; min-height:18px; opacity:0; transition:opacity .2s; }
  .pf-err.show{ opacity:1; }
  .pf-foot{ margin-top:30px; font-size:12px; color:rgba(46,39,34,.55); letter-spacing:.04em; animation:rise .7s .24s ease both; }
  .shake{ animation:shake .4s; }

  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-7px);} 40%,80%{transform:translateX(7px);} }

  /* ---------- PLAN VIEW ---------- */
  .pf-planview{ display:none; }
  .pf-bar{ position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between;
    padding:13px 18px; background:rgba(246,239,228,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .pf-bar .b{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; } .pf-bar .b b{ color:var(--clay); }
  .pf-exit{ background:none; border:1px solid var(--line); border-radius:9px; padding:7px 14px;
    font-family:'Mulish',sans-serif; font-size:12.5px; font-weight:700; color:var(--ink); cursor:pointer; }
  .pf-exit:hover{ border-color:var(--clay); color:var(--clay); }

  /* ===== ESTILOS DEL PLAN (inyectados) ===== */
  
  /* ===== TU MARCA — pega aquí tus HEX reales de camibalance ===== */
  :root{
    --cream:#F6EFE4; --ink:#2E2722; --clay:#C2674A; --sage:#7C8B6B;
    --gold:#C99A4E; --soft:#EFE4D2; --line:#DCCBB3; --warn:#B65B3C;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  .plan-view{ background:var(--cream); color:var(--ink); font-family:'Mulish',sans-serif;
    line-height:1.55; padding:36px 18px; display:flex; justify-content:center; -webkit-font-smoothing:antialiased; }
  .doc{ width:100%; max-width:860px; }

  .top{ display:flex; align-items:center; justify-content:space-between; padding-bottom:18px; border-bottom:2px solid var(--ink); }
  .logo{ font-family:'Fraunces',serif; font-size:26px; font-weight:600; letter-spacing:-.5px; }
  .logo b{ color:var(--clay); }
  .top .meta{ font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--sage); text-align:right; }

  h1{ font-family:'Fraunces',serif; font-size:34px; font-weight:600; letter-spacing:-.8px; margin:26px 0 4px; }
  h1 span{ color:var(--clay); }
  .lead{ font-size:15px; color:rgba(46,39,34,.78); max-width:64ch; }

  .section{ margin-top:30px; }
  .label{ display:flex; align-items:center; gap:12px; font-family:'Fraunces',serif; font-style:italic; font-size:20px; margin-bottom:14px; }
  .label .n{ font-style:normal; font-weight:700; color:var(--clay); font-size:15px; border:1.5px solid var(--clay); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .label::after{ content:""; flex:1; height:1px; background:var(--line); }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .card{ background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .card .k{ font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--sage); }
  .card .v{ font-size:14.5px; margin-top:3px; }

  .read{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
  .stat{ background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:14px 10px; text-align:center; }
  .stat .big{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--clay); }
  .stat .nm{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--sage); margin-top:5px; }
  .stat .sub{ font-size:11px; color:rgba(46,39,34,.6); margin-top:2px; }

  .highlight{ background:#EEF1E8; border:1.5px solid var(--sage); border-radius:14px; padding:18px 20px; }
  .highlight h3{ font-family:'Fraunces',serif; color:var(--sage); font-size:18px; margin-bottom:7px; }
  .highlight p{ font-size:14px; } .highlight b{ color:var(--ink); }

  .key-box{ background:#FBF1E9; border:1.5px solid var(--warn); border-radius:14px; padding:18px 20px; }
  .key-box h3{ font-family:'Fraunces',serif; color:var(--warn); font-size:18px; margin-bottom:8px; }
  .key-box li{ font-size:14px; margin:0 0 7px 18px; } .key-box b{ color:var(--warn); }

  .macros{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .macro{ background:var(--ink); color:var(--cream); border-radius:14px; padding:18px 12px; text-align:center; }
  .macro .big{ font-family:'Fraunces',serif; font-size:30px; font-weight:600; color:var(--gold); line-height:1; }
  .macro .nm{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; margin-top:7px; opacity:.85; }
  .note{ font-size:13px; color:rgba(46,39,34,.7); margin-top:12px; font-style:italic; }

  /* measuring + exchange tables */
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--sage); }
  td.r,th.r{ text-align:right; }
  tr.tot td{ font-weight:700; border-top:2px solid var(--ink); border-bottom:none; }
  .measure-box{ background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:6px 16px 10px; margin-top:10px; }

  .scale-note{ background:rgba(201,154,78,.16); border-left:3px solid var(--gold); padding:12px 14px; border-radius:0 8px 8px 0; font-size:13.5px; margin-bottom:14px; }
  .scale-note b{ color:var(--clay); }

  /* exchange category */
  .ex{ background:var(--soft); border:1px solid var(--line); border-radius:14px; padding:6px 18px 12px; margin-bottom:14px; }
  .ex .exh{ font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--clay); padding:12px 0 2px; }
  .ex .exh small{ font-family:'Mulish',sans-serif; font-size:12px; color:var(--sage); font-weight:600; }
  .ex td:first-child{ font-weight:600; }
  .opt{ display:inline-block; background:var(--clay); color:var(--cream); font-size:11px; font-weight:700; border-radius:6px; padding:1px 7px; margin-right:6px; }

  /* meals */
  .meal{ background:var(--soft); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:12px; }
  .meal .mh{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; border-bottom:1px dashed var(--line); padding-bottom:8px; margin-bottom:10px; }
  .meal .mh .name{ font-family:'Fraunces',serif; font-size:18px; font-weight:600; }
  .meal .mh .time{ font-size:12px; font-weight:700; color:var(--clay); letter-spacing:.04em; }
  .meal .plate{ font-size:14.5px; }
  .meal .plate b{ color:var(--ink); }
  .meal .swap{ font-size:13px; background:rgba(124,139,107,.14); border-left:3px solid var(--sage); padding:8px 12px; border-radius:0 8px 8px 0; margin-top:10px; }
  .meal .swap b{ color:var(--sage); }

  .cols{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .listbox{ background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .listbox h4{ font-family:'Fraunces',serif; font-size:15px; margin-bottom:8px; color:var(--clay); }
  .listbox li{ font-size:13.5px; margin:0 0 4px 16px; }

  .habits li{ font-size:14px; margin:0 0 7px 18px; } .habits b{ color:var(--sage); }

  .foot{ margin-top:34px; padding:22px 24px; background:var(--ink); color:var(--cream); border-radius:16px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
  .foot .l{ font-family:'Fraunces',serif; font-style:italic; font-size:17px; max-width:34ch; } .foot .l b{ color:var(--gold); font-style:normal; }
  .foot .c{ font-size:13px; text-align:right; } .foot .c b{ color:var(--gold); }

  @media (max-width:600px){
    .grid,.cols{ grid-template-columns:1fr; }
    .macros,.read{ grid-template-columns:repeat(2,1fr); }
    .foot{ flex-direction:column; align-items:flex-start; } .foot .c{ text-align:left; }
  }
  @media print{ .plan-view{ padding:0; } @page{ size:A4; margin:12mm; } }


  /* el plan vive dentro de .plan-view en vez de body */
  .plan-view{ padding:30px 16px 60px; display:flex; justify-content:center; animation:rise .5s ease both; }
  @media (max-width:600px){ .plan-view{ padding:20px 12px 50px; } }
</style>
</head>
<body>

  <!-- GATE -->
  <div class="pf-gate" id="gate">

      <h2>Accede a tu plan</h2>
      <p>Escribe el código que te envió tu coach.</p>
      <input class="pf-input" id="code" type="password" placeholder="Código de acceso"
        autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="pf-btn" id="enter">Entrar</button>
      <div class="pf-err" id="err">Código incorrecto. Verifica con tu coach.</div>
    </div>
    <div class="pf-foot">camibalance · @rodguezcami</div>
  </div>

  <!-- PLAN -->
  <div class="pf-planview" id="planview">

      <div class="b">cami<b>balance</b></div>

    <div class="plan-view"><div class="doc" id="planContent"></div></div>
  </div>

  function b64ToBytes(s){ const bin=atob(s); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
  async function deriveKey(pass, salt){
    const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
      baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  }
  async function tryDecrypt(pass){
    for(const e of PLANES){
      try{
        const key = await deriveKey(pass, b64ToBytes(e.salt));
        const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64ToBytes(e.iv)}, key, b64ToBytes(e.data));
        return new TextDecoder().decode(pt);
      }catch(_){ /* código no corresponde a este plan */ }
    }
    return null;
  }
  async function unlock(){
    const pass = document.getElementById('code').value.trim();
    const err = document.getElementById('err');
    if(!pass) return;
    document.getElementById('enter').textContent = 'Abriendo…';
    const html = await tryDecrypt(pass);
    document.getElementById('enter').textContent = 'Entrar';
    if(html){
      document.getElementById('planContent').innerHTML = html;
      document.getElementById('gate').style.display='none';
      document.getElementById('planview').style.display='block';
      window.scrollTo(0,0);
    }else{
      err.classList.add('show');
      document.getElementById('card').classList.add('shake');
      setTimeout(()=>document.getElementById('card').classList.remove('shake'), 450);
    }
  }
  document.getElementById('enter').addEventListener('click', unlock);
  document.getElementById('code').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
  document.getElementById('exit').addEventListener('click', ()=>{
    document.getElementById('planview').style.display='none';
    document.getElementById('planContent').innerHTML='';
    document.getElementById('code').value='';
    document.getElementById('err').classList.remove('show');
    document.getElementById('gate').style.display='flex';
  });
</script>
