<style>

  /* ---------- GATE ---------- */
  .pf-gate{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 22px; text-align:center; }

    animation:rise .7s .08s ease both; }
  .pf-card{ background:var(--cream); border:1px solid var(--line); border-radius:20px;
    padding:30px 26px; width:100%; max-width:380px; box-shadow:0 30px 70px -45px rgba(46,39,34,.5);
    animation:rise .7s .16s ease both; }
  .pf-card h2{ font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin-bottom:6px; }
  .pf-card p{ font-size:13.5px; color:rgba(46,39,34,.7); margin-bottom:20px; }
  .pf-input{ width:100%; padding:14px 16px; border:1.5px solid var(--line); border-radius:12px;
    font-family:'Mulish',sans-serif; font-size:16px; color:var(--ink); background:#fff; text-align:center;
    letter-spacing:.05em; transition:border-color .2s; }
  .pf-input:focus{ outline:none; border-color:var(--clay); }
  .pf-btn{ width:100%; margin-top:12px; padding:14px; border:none; border-radius:12px;
    background:var(--ink); color:var(--cream); font-family:'Mulish',sans-serif; font-size:15px; font-weight:700;
    letter-spacing:.03em; cursor:pointer; transition:transform .15s, background .2s; }
  .pf-btn:hover{ background:var(--clay); }
  .pf-btn:active{ transform:scale(.98); }
  .pf-err{ color:var(--warn); font-size:13px; font-weight:600; margin-top:14px; min-height:18px; opacity:0; transition:opacity .2s; }
  .pf-err.show{ opacity:1; }
  .pf-foot{ margin-top:30px; font-size:12px; color:rgba(46,39,34,.55); letter-spacing:.04em; animation:rise .7s .24s ease both; }
  .shake{ animation:shake .4s; }

  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-7px);} 40%,80%{transform:translateX(7px);} }

  /* ---------- PLAN VIEW ---------- */
  .pf-planview{ display:none; }
  .pf-bar{ position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between;

  .pf-exit:hover{ border-color:var(--clay); color:var(--clay); }

  async function deriveKey(pass, salt){
    const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
      baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  }
  async function tryDecrypt(pass){
    for(const e of PLANES){
      try{
        const key = await deriveKey(pass, b64ToBytes(e.salt));
        const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64ToBytes(e.iv)}, key, b64ToBytes(e.data));
        return new TextDecoder().decode(pt);
      }catch(_){ /* código no corresponde a este plan */ }
    }
    return null;
  }
  async function unlock(){
    const pass = document.getElementById('code').value.trim().toLowerCase();
    const err = document.getElementById('err');
    if(!pass) return;
    document.getElementById('enter').textContent = 'Abriendo…';
    const html = await tryDecrypt(pass);
    document.getElementById('enter').textContent = 'Entrar';
    if(html){
      document.getElementById('planContent').innerHTML = html;
      document.getElementById('gate').style.display='none';
      document.getElementById('planview').style.display='block';
      window.scrollTo(0,0);
    }else{
      err.classList.add('show');
      document.getElementById('card').classList.add('shake');
      setTimeout(()=>document.getElementById('card').classList.remove('shake'), 450);
    }
  }
  document.getElementById('enter').addEventListener('click', unlock);
  document.getElementById('code').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
  document.getElementById('exit').addEventListener('click', ()=>{
    document.getElementById('planview').style.display='none';
    document.getElementById('planContent').innerHTML='';
    document.getElementById('code').value='';
    document.getElementById('err').classList.remove('show');
    document.getElementById('gate').style.display='flex';
  });
</script>
